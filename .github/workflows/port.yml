name: HyperOS Port Builder

on:
  workflow_dispatch:
    inputs:
      stock_rom_url:
        description: "URL to Stock ROM ZIP (Base ROM)"
        required: true
        type: string
      port_rom_url:
        description: "URL to Port ROM ZIP (leave empty for Official Modification mode)"
        required: false
        type: string
      device_code:
        description: "Device codename (e.g. fuxi, mayfly)"
        required: true
        type: string
      pack_type:
        description: "Output format"
        required: false
        default: "payload"
        type: choice
        options:
          - payload
          - super
      fs_type:
        description: "Filesystem type"
        required: false
        default: "erofs"
        type: choice
        options:
          - erofs
          - ext4
      enable_ksu:
        description: "Inject KernelSU"
        required: false
        default: false
        type: boolean
      eu_bundle_url:
        description: "URL to EU Localization Bundle ZIP (optional)"
        required: false
        type: string
      upload_target:
        description: "Upload destination"
        required: false
        default: "artifact"
        type: choice
        options:
          - artifact
          - pixeldrain
          - gdrive

jobs:
  build:
    name: Build HyperOS Port
    # ubuntu-24.04 ships glibc 2.39, required by the bundled otatools binaries
    # ubuntu-22.04 only has glibc 2.35 → "GLIBC_2.38 not found" crash
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            aria2 \
            unzip zip \
            android-sdk-libsparse-utils \
            brotli lz4 \
            libssl-dev \
            erofs-utils \
            zipalign

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Pre-download otatools via aria2c before main.py runs
      # This way OtaToolsManager finds the folder already populated and skips its slow single-threaded download
      - name: Cache otatools
        id: cache-otatools
        uses: actions/cache@v4
        with:
          path: otatools
          key: otatools-toraidl-assets

      - name: Download otatools
        if: steps.cache-otatools.outputs.cache-hit != 'true'
        run: |
          aria2c \
            --split=16 \
            --max-connection-per-server=16 \
            --min-split-size=10M \
            --out=otatools.zip \
            "https://github.com/toraidl/HyperOS-Port-Python/releases/download/assets/otatools.zip"
          mkdir -p otatools
          unzip -q otatools.zip -d otatools
          rm otatools.zip
          chmod +x otatools/bin/* 2>/dev/null || true

      # aria2c: 16 parallel connections — much faster than single-threaded wget
      - name: Download Stock ROM
        run: |
          aria2c \
            --split=16 \
            --max-connection-per-server=16 \
            --min-split-size=10M \
            --out=stock_rom.zip \
            "${{ github.event.inputs.stock_rom_url }}"
          echo "STOCK_ROM_PATH=$(pwd)/stock_rom.zip" >> $GITHUB_ENV

      - name: Download Port ROM
        if: ${{ github.event.inputs.port_rom_url != '' }}
        run: |
          aria2c \
            --split=16 \
            --max-connection-per-server=16 \
            --min-split-size=10M \
            --out=port_rom.zip \
            "${{ github.event.inputs.port_rom_url }}"
          echo "PORT_ROM_PATH=$(pwd)/port_rom.zip" >> $GITHUB_ENV

      - name: Download EU Bundle
        if: ${{ github.event.inputs.eu_bundle_url != '' }}
        run: |
          aria2c \
            --split=16 \
            --max-connection-per-server=16 \
            --min-split-size=10M \
            --out=eu_bundle.zip \
            "${{ github.event.inputs.eu_bundle_url }}"
          echo "EU_BUNDLE_PATH=$(pwd)/eu_bundle.zip" >> $GITHUB_ENV

      - name: Build port arguments
        id: build_args
        run: |
          ARGS="--stock ${{ env.STOCK_ROM_PATH }}"
          ARGS="$ARGS --pack-type ${{ github.event.inputs.pack_type }}"
          ARGS="$ARGS --fs-type ${{ github.event.inputs.fs_type }}"
          ARGS="$ARGS --work-dir build"
          ARGS="$ARGS --clean"

          if [ -n "${{ env.PORT_ROM_PATH }}" ]; then
            ARGS="$ARGS --port ${{ env.PORT_ROM_PATH }}"
          fi

          if [ "${{ github.event.inputs.enable_ksu }}" = "true" ]; then
            ARGS="$ARGS --ksu"
          fi

          if [ -n "${{ env.EU_BUNDLE_PATH }}" ]; then
            ARGS="$ARGS --eu-bundle ${{ env.EU_BUNDLE_PATH }}"
          fi

          echo "ARGS=$ARGS" >> $GITHUB_OUTPUT

      - name: Run HyperOS Port
        run: |
          sudo python3 main.py ${{ steps.build_args.outputs.ARGS }}

      - name: Find output ROM
        id: find_output
        run: |
          OUTPUT=$(find out/ -name "*.zip" | head -1)
          if [ -z "$OUTPUT" ]; then
            echo "ERROR: No output ROM found in out/"
            exit 1
          fi
          echo "OUTPUT_FILE=$OUTPUT" >> $GITHUB_OUTPUT
          echo "OUTPUT_NAME=$(basename $OUTPUT)" >> $GITHUB_OUTPUT
          echo "Found output: $OUTPUT"

      # ── Artifact (default) ──────────────────────────────────────────────────
      - name: Upload as Artifact
        if: github.event.inputs.upload_target == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_output.outputs.OUTPUT_NAME }}
          path: ${{ steps.find_output.outputs.OUTPUT_FILE }}
          retention-days: 7
          compression-level: 0

      # ── Pixeldrain ──────────────────────────────────────────────────────────
      # Requires secret: PIXELDRAIN_API_KEY
      # Get it at: https://pixeldrain.com/user/api
      - name: Upload to Pixeldrain
        if: github.event.inputs.upload_target == 'pixeldrain'
        run: |
          FILENAME="${{ steps.find_output.outputs.OUTPUT_NAME }}"
          FILEPATH="${{ steps.find_output.outputs.OUTPUT_FILE }}"

          echo "Uploading $FILENAME to Pixeldrain..."
          RESPONSE=$(curl -s -T "$FILEPATH" \
            -u ":${{ secrets.PIXELDRAIN_API_KEY }}" \
            "https://pixeldrain.com/api/file/$FILENAME")

          FILE_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          if [ -z "$FILE_ID" ]; then
            echo "Upload failed: $RESPONSE"
            exit 1
          fi

          echo "✅ Upload successful!"
          echo "📥 Download: https://pixeldrain.com/u/$FILE_ID"
          echo "PIXELDRAIN_URL=https://pixeldrain.com/u/$FILE_ID" >> $GITHUB_ENV

      - name: Print Pixeldrain link
        if: github.event.inputs.upload_target == 'pixeldrain'
        run: |
          echo "### 📥 Download Link" >> $GITHUB_STEP_SUMMARY
          echo "**Pixeldrain:** ${{ env.PIXELDRAIN_URL }}" >> $GITHUB_STEP_SUMMARY

      # ── Google Drive ────────────────────────────────────────────────────────
      # Requires secrets: GDRIVE_CREDENTIALS_JSON, GDRIVE_FOLDER_ID
      # GDRIVE_CREDENTIALS_JSON — Service Account JSON key (base64 encoded)
      # GDRIVE_FOLDER_ID — ID of the target Google Drive folder
      - name: Upload to Google Drive
        if: github.event.inputs.upload_target == 'gdrive'
        run: |
          pip install -q google-auth google-auth-httplib2 google-api-python-client

          echo "${{ secrets.GDRIVE_CREDENTIALS_JSON }}" | base64 -d > /tmp/gdrive_creds.json

          python3 << 'EOF'
          import os
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2 import service_account

          creds = service_account.Credentials.from_service_account_file(
              '/tmp/gdrive_creds.json',
              scopes=['https://www.googleapis.com/auth/drive']
          )
          service = build('drive', 'v3', credentials=creds)

          filepath = os.environ['OUTPUT_FILE']
          filename = os.environ['OUTPUT_NAME']
          folder_id = os.environ['GDRIVE_FOLDER_ID']

          file_metadata = {'name': filename, 'parents': [folder_id]}
          media = MediaFileUpload(filepath, resumable=True, chunksize=100*1024*1024)

          print(f"Uploading {filename} to Google Drive...")
          file = service.files().create(
              body=file_metadata,
              media_body=media,
              fields='id,webViewLink'
          ).execute()

          link = file.get('webViewLink')
          file_id = file.get('id')

          # Make file publicly readable
          service.permissions().create(
              fileId=file_id,
              body={'type': 'anyone', 'role': 'reader'}
          ).execute()

          print(f"✅ Upload successful!")
          print(f"📥 Link: https://drive.google.com/uc?id={file_id}&export=download")

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"GDRIVE_URL=https://drive.google.com/uc?id={file_id}&export=download\n")
          EOF
        env:
          OUTPUT_FILE: ${{ steps.find_output.outputs.OUTPUT_FILE }}
          OUTPUT_NAME: ${{ steps.find_output.outputs.OUTPUT_NAME }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}

      - name: Print Google Drive link
        if: github.event.inputs.upload_target == 'gdrive'
        run: |
          echo "### 📥 Download Link" >> $GITHUB_STEP_SUMMARY
          echo "**Google Drive:** ${{ env.GDRIVE_URL }}" >> $GITHUB_STEP_SUMMARY
