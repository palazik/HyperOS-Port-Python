name: HyperOS Port Builder

on:
  workflow_dispatch:
    inputs:
      stock_rom_url:
        description: "URL to Stock ROM ZIP (Base ROM)"
        required: true
        type: string
      port_rom_url:
        description: "URL to Port ROM ZIP (leave empty for Official Modification mode)"
        required: false
        type: string
      device_code:
        description: "Device codename (e.g. fuxi, mayfly)"
        required: true
        type: string
      pack_type:
        description: "Output format"
        required: false
        default: "payload"
        type: choice
        options:
          - payload
          - super
      fs_type:
        description: "Filesystem type"
        required: false
        default: "erofs"
        type: choice
        options:
          - erofs
          - ext4
      enable_ksu:
        description: "Inject KernelSU"
        required: false
        default: false
        type: boolean
      eu_bundle_url:
        description: "URL to EU Localization Bundle ZIP (optional)"
        required: false
        type: string

jobs:
  build:
    name: Build HyperOS Port
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git curl wget unzip zip \
            android-sdk-libsparse-utils \
            brotli lz4 \
            libssl-dev \
            erofs-utils \
            zipalign

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Stock ROM
        run: |
          echo "Downloading Stock ROM..."
          wget -q --show-progress -O stock_rom.zip "${{ github.event.inputs.stock_rom_url }}"
          echo "STOCK_ROM_PATH=$(pwd)/stock_rom.zip" >> $GITHUB_ENV

      - name: Download Port ROM
        if: ${{ github.event.inputs.port_rom_url != '' }}
        run: |
          echo "Downloading Port ROM..."
          wget -q --show-progress -O port_rom.zip "${{ github.event.inputs.port_rom_url }}"
          echo "PORT_ROM_PATH=$(pwd)/port_rom.zip" >> $GITHUB_ENV

      - name: Download EU Bundle
        if: ${{ github.event.inputs.eu_bundle_url != '' }}
        run: |
          echo "Downloading EU Bundle..."
          wget -q --show-progress -O eu_bundle.zip "${{ github.event.inputs.eu_bundle_url }}"
          echo "EU_BUNDLE_PATH=$(pwd)/eu_bundle.zip" >> $GITHUB_ENV

      - name: Build port arguments
        id: build_args
        run: |
          ARGS="--stock ${{ env.STOCK_ROM_PATH }}"
          ARGS="$ARGS --pack-type ${{ github.event.inputs.pack_type }}"
          ARGS="$ARGS --fs-type ${{ github.event.inputs.fs_type }}"
          ARGS="$ARGS --work-dir build"
          ARGS="$ARGS --clean"

          if [ -n "${{ env.PORT_ROM_PATH }}" ]; then
            ARGS="$ARGS --port ${{ env.PORT_ROM_PATH }}"
          fi

          if [ "${{ github.event.inputs.enable_ksu }}" = "true" ]; then
            ARGS="$ARGS --ksu"
          fi

          if [ -n "${{ env.EU_BUNDLE_PATH }}" ]; then
            ARGS="$ARGS --eu-bundle ${{ env.EU_BUNDLE_PATH }}"
          fi

          echo "ARGS=$ARGS" >> $GITHUB_OUTPUT

      - name: Run HyperOS Port
        run: |
          sudo python3 main.py ${{ steps.build_args.outputs.ARGS }}

      - name: Find output ROM
        id: find_output
        run: |
          OUTPUT=$(find out/ -name "*.zip" | head -1)
          if [ -z "$OUTPUT" ]; then
            echo "ERROR: No output ROM found in out/"
            exit 1
          fi
          echo "OUTPUT_FILE=$OUTPUT" >> $GITHUB_OUTPUT
          echo "OUTPUT_NAME=$(basename $OUTPUT)" >> $GITHUB_OUTPUT
          echo "Found output: $OUTPUT"

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperOS-Port-${{ github.event.inputs.device_code }}-${{ github.run_number }}
          path: ${{ steps.find_output.outputs.OUTPUT_FILE }}
          retention-days: 7
          compression-level: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: port-${{ github.event.inputs.device_code }}-${{ github.run_number }}
          name: "HyperOS Port [${{ github.event.inputs.device_code }}] #${{ github.run_number }}"
          body: |
            ## Build Info
            - **Device**: `${{ github.event.inputs.device_code }}`
            - **Pack type**: `${{ github.event.inputs.pack_type }}`
            - **Filesystem**: `${{ github.event.inputs.fs_type }}`
            - **KernelSU**: `${{ github.event.inputs.enable_ksu }}`
            - **Mode**: ${{ github.event.inputs.port_rom_url != '' && 'Port mode' || 'Official Modification mode' }}
            - **Built on**: ${{ github.run_number }}
          files: ${{ steps.find_output.outputs.OUTPUT_FILE }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
